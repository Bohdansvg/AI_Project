<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI Bot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dark.css">
    <link rel="icon" type="image/png" href="ai.png">
</head>

<body>


<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="app-container">

    <div class="sidebar">
        <button class="new-chat-btn" onclick="createNewChat()"></button>
        <div id="chatList" class="chat-list"></div>

        <div class="sidebar-footer">
            <label class="theme-toggle container">
                <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
                <span class="slider round">
        <div class="background"></div>
        <div class="star"></div>
        <div class="star"></div>
    </span>
            </label>
        </div>
    </div>

    <div class="chat">

        <div class="chat-header">
            <button class="menu-btn" onclick="toggleSidebar()"></button>
            <h1 id="chatTitle">[ NEW CHAT ]</h1>
            <button class="logout" onclick="logout()"></button>
        </div>

        <div id="messages" class="messages"></div>

        <div class="input">
            <input type="file" id="fileInput" style="display: none" multiple accept=".txt,.pdf,.doc,.docx,.xls,.xlsx,.js,.html,.css,.py,.java, .png, .jpg, .jpeg, .gif, .webp">
            <button id="attachBtn" class="attach" onclick="document.getElementById('fileInput').click()" disabled title="Attach file">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <input id="userInput" placeholder="Enter your message" disabled>
            <button id="sendBtn" class="send" onclick="sendMessage()" disabled>
                <canvas id="metalCanvas"></canvas>
                <svg class="send-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 19V5M12 5L6 11M12 5L18 11" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>

    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="AI_Bot.js"></script>

</body>
</html>
