<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI Bot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dark.css">
    <link rel="icon" type="image/png" href="ai.png">
</head>

<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="app-container">

    <div class="sidebar">
        <button class="new-chat-btn" onclick="createNewChat()"></button>
        <div id="chatList" class="chat-list"></div>

        <div class="sidebar-footer">
            <label class="theme-toggle container">
                <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
                <span class="slider round">
                    <div class="background"></div>
                    <div class="star"></div>
                    <div class="star"></div>
                </span>
            </label>
        </div>
    </div>

    <div class="chat">

        <div class="chat-header">
            <button class="menu-btn" onclick="toggleSidebar()"></button>
            <h1 id="chatTitle">[ NEW CHAT ]</h1>
            <button class="logout" onclick="logout()">
        <span class="sign">
            <svg viewBox="0 0 512 512">
                <path d="M377.9 105.9L500.7 228.7c7.2 7.2 11.3 17.1 11.3 27.3s-4.1 20.1-11.3 27.3L377.9 406.1c-6.4 6.4-15 9.9-24 9.9c-18.7 0-33.9-15.2-33.9-33.9l0-62.1-128 0c-17.7 0-32-14.3-32-32l0-64c0-17.7 14.3-32 32-32l128 0 0-62.1c0-18.7 15.2-33.9 33.9-33.9c9 0 17.6 3.6 24 9.9zM160 96L96 96c-17.7 0-32 14.3-32 32l0 256c0 17.7 14.3 32 32 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32l-64 0c-53 0-96-43-96-96L0 128C0 75 43 32 96 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32z"></path>
            </svg>
        </span>
                <span class="text">Logout</span>
            </button>
        </div>

        <div id="messages" class="messages"></div>

        <div class="input">
            <input type="file" id="fileInput" style="display: none" multiple
                   accept=".txt,.pdf,.doc,.docx,.xls,.xlsx,.js,.html,.css,.py,.java, .png, .jpg, .jpeg, .gif, .webp">
            <div id="attachPreview"></div>
            <div class="input-box">
                <textarea id="userInput" rows="1" placeholder="Enter your message" disabled></textarea>
                <div class="input-bottom">
                    <button id="attachBtn" class="attach" onclick="document.getElementById('fileInput').click()"
                            disabled title="Attach file">
                        <svg aria-hidden="true" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" fill="none"
                             xmlns="http://www.w3.org/2000/svg">
                            <path stroke-width="2" stroke="currentColor"
                                  d="M13.5 3H12H8C6.34315 3 5 4.34315 5 6V18C5 19.6569 6.34315 21 8 21H11M13.5 3L19 8.625M13.5 3V7.625C13.5 8.17728 13.9477 8.625 14.5 8.625H19M19 8.625V11.8125"
                                  stroke-linejoin="round" stroke-linecap="round"></path>
                            <path stroke-linejoin="round" stroke-linecap="round" stroke-width="2" stroke="currentColor"
                                  d="M17 15V18M17 21V18M17 18H14M17 18H20"></path>
                        </svg>
                    </button>
                    <button id="sendBtn" class="send" onclick="sendMessage()" disabled>
                    </button>
                </div>
            </div>
        </div>

    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="AI_Bot.js"></script>

</body>
</html>
