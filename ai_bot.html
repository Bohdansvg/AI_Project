<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI Bot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dark.css">
    <link rel="icon" type="image/png" href="ai.png">
</head>

<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="app-container">

    <div class="sidebar">
        <button class="new-chat-btn" onclick="createNewChat()"></button>
        <div id="chatList" class="chat-list"></div>

        <div class="sidebar-footer">
            <label class="theme-toggle container">
                <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
                <span class="slider round">
                    <div class="background"></div>
                    <div class="star"></div>
                    <div class="star"></div>
                </span>
            </label>
        </div>
    </div>

    <div class="chat">

        <div class="chat-header">
            <button class="menu-btn" onclick="toggleSidebar()"></button>
            <h1 id="chatTitle">[ NEW CHAT ]</h1>
            <button class="logout" onclick="logout()">
                <span class="sign">
                    <img src = "logout.png" alt = "logout">
                </span>
                <span class ="text">Exit</span>
                </button>
        </div>

        <div id="messages" class="messages"></div>

        <div class="input">
            <input type="file" id="fileInput" style="display: none" multiple
                   accept=".txt,.pdf,.doc,.docx,.xls,.xlsx,.js,.html,.css,.py,.java, .png, .jpg, .jpeg, .gif, .webp">
            <div id="attachPreview"></div>
            <div class="input-box">
                <textarea id="userInput" rows="1" placeholder="Enter your message" disabled></textarea>
                <div class="input-bottom">
                    <button id="attachBtn" class="attach" onclick="document.getElementById('fileInput').click()"
                            disabled title="Attach file">
                        <svg aria-hidden="true" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" fill="none"
                             xmlns="http://www.w3.org/2000/svg">
                            <path stroke-width="2" stroke="currentColor"
                                  d="M13.5 3H12H8C6.34315 3 5 4.34315 5 6V18C5 19.6569 6.34315 21 8 21H11M13.5 3L19 8.625M13.5 3V7.625C13.5 8.17728 13.9477 8.625 14.5 8.625H19M19 8.625V11.8125"
                                  stroke-linejoin="round" stroke-linecap="round"></path>
                            <path stroke-linejoin="round" stroke-linecap="round" stroke-width="2" stroke="currentColor"
                                  d="M17 15V18M17 21V18M17 18H14M17 18H20"></path>
                        </svg>
                    </button>
                    <button id="sendBtn" class="send" onclick="sendMessage()" disabled>
                    </button>
                </div>
            </div>
        </div>

    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="AI_Bot.js"></script>

</body>
</html>
