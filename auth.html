<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI Bot</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="icon" type="image/png" href="ai.png">
</head>
<body>

<div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<div class="auth-wrapper">
    <div class="auth-container" id="authContainer">

        <div class="card-header">
            <div class="logo-wrap">
                <img src="ai.png" alt="AI Bot" class="logo-img">
                <div class="logo-glow"></div>
            </div>
            <h1 class="brand-name">AI<span>Bot</span></h1>
            <p class="brand-sub" id="brandSub">Create your account to get started</p>
        </div>

        <div class="card-body">
            <div id="userNameWrapper" class="field-group fieldWrapper">
                <label for="userName">Username</label>
                <div class="input-wrap">
                    <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="8" r="4"/>
                        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                    </svg>
                    <input type="text" id="userName" placeholder="Enter your username" autocomplete="username"/>
                </div>
            </div>

            <div class="field-group">
                <label for="email">Email</label>
                <div class="input-wrap">
                    <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="4" width="20" height="16" rx="2"/>
                        <path d="m2 7 10 7 10-7"/>
                    </svg>
                    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" inputmode="email"/>
                </div>
            </div>

            <div class="field-group">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
                </div>
            </div>

            <button id="authBtn" class="submit-btn" onclick="handleSubmit()">
                <span id="btnText">Create Account</span>
                <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </button>




            <button class="oauthButton" onclick="signInWithGoogle()">
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
                    <path d="M1 1h22v22H1z" fill="none"></path>
                </svg>
                Continue with Google
            </button>

            <p class="toggle-text" id="toggleText1" style="display: none;">
                Don't have an account?
                <a href="#" onclick="toggleMode(event)">Register</a>
            </p>

            <p class="toggle-text" id="toggleText">
                Already have an account?
                <a href="#" onclick="toggleMode(event)">Sign in</a>
            </p>
        </div>

    </div>
</div>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="app.js"></script>

</body>
</html>
