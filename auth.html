<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Bot</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="icon" type="image/png" href="ai.png">
</head>
<body>

<div class="auth-container" id="authContainer">
    <div class="input_info">
        <h2 id="authTitle">Create Account</h2>

        <div id="userNameWrapper" class="fieldWrapper">
            <input type="text" id="userName" placeholder="Username"/>
        </div>

        <input type="email" id="email" placeholder="Email"/>
        <input type="password" id="password" placeholder="Password"/>

        <button id="authBtn" onclick="handleSubmit()">Register</button>


        <p class="login-link" id="toggleText">
            Already have an account?
            <a href="#" onclick="toggleMode(event)">Login</a>
        </p>
    </div>

</div>


<script src="app.js"></script>

</body>
</html>
